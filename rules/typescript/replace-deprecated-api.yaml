name: replace-deprecated-api
description: Replace deprecated React component lifecycle methods with modern alternatives
language: typescript
version: "1.0"

pattern:
  before: "componentWillMount()"
  after: "componentDidMount()"

config:
  include:
    - "src/**/*.tsx"
    - "src/**/*.ts"
  exclude:
    - "**/*.test.ts"
    - "**/*.spec.ts"
